services:
  # FastAPI Backend Service
  - type: web
    name: flowsense-api
    env: python
    buildCommand: pip install -r backend/requirements.txt && python backend/seed.py
    startCommand: uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./flowsense.db
      - key: SECRET_KEY
        value: flowsense-procurement-secret-key-btech-miniproject

  # React Frontend Static Site
  - type: static
    name: flowsense-frontend
    env: node
    buildCommand: cd frontend && npm install && npm run build
    publishPath: frontend/dist
    headers:
      - path: /*
        headers:
          - key: Cache-Control
            value: public, max-age=31536000
    routes:
      - type: rewrite
        src: /*
        dest: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          name: flowsense-api
          type: web
          property: url
