version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./flowsense.db:/workspace/flowsense.db
    environment:
      - DATABASE_URL=sqlite+aiosqlite:////workspace/flowsense.db
      - REDIS_URL=redis://redis:6379/0
      - FALLBACK_WEATHER_MODE=True
      - FALLBACK_NEWS_MODE=True
    depends_on:
      - redis

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      - backend

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
